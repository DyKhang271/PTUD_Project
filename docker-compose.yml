services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:8080
    volumes:
      - ./data_json:/data_json:ro
      - ./backend/storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
